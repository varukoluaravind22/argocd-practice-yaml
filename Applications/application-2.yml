apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapplication-2
  namespace: argocd
spec:
  project: myproject-2
  source:
    repoURL: https://github.com/varukoluaravind22/kubernetes-yaml.git
    targetRevision: Practice_yaml
    path: argocd-deployments
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated: 
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true


