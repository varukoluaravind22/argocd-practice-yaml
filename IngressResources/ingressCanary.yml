apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: canary
spec:
  ingressClassName: nginx
  rules:
  - host: canary.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argo-canary-svc-devops
            port:
              number: 8081