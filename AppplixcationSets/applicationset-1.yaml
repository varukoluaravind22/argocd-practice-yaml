apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: list-generator
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - cluster: local
        url: https://kubernetes.default.svc
        path: argocd-deployments
  template:
    metadata:
      name: '{{cluster}}-app'
    spec:
      project: myproject-1
      source:
        repoURL: https://github.com/varukoluaravind22/kubernetes-yaml.git
        targetRevision: Practice_yaml
        path: '{{path}}'
      destination:
        server: '{{url}}'
        namespace: '{{cluster}}'

      syncPolicy:
        automated: {}
        syncOptions:
        - CreateNamespace=true