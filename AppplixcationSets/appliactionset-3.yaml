apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: list-generator-3
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: '{{name}}-app'
      namespace: argocd
    spec:
      project: myproject-1
      source:
        repoURL: https://github.com/varukoluaravind22/kubernetes-yaml.git
        targetRevision: Practice_yaml
        path: argocd-deployments
      destination:
        server: '{{server}}'
        namespace: staging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true