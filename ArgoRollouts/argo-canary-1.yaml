apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: argo-canary-l1
  namespace: canary
spec:
  replicas: 1
  strategy:
    canary:
      steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 40
      - pause: {duration: 10s}
      - setWeight: 60
      - pause: {duration: 20s}
      - setWeight: 80
      - pause: {duration: 1m}
  selector:
    matchLabels:
      app: canary-devops
  template:
    metadata:
      labels:
        app: canary-devops
    spec:
      containers:
      - name: devops-l1
        image: varukoluaravind22/ci-cd:mydevopsappL1-34
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8081

        livenessProbe:
          httpGet:
            path: /devops
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /devops
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10 
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          limits:
            cpu: 500m
            memory: 1Gi
          requests:
            cpu: 200m
            memory: 1Gi

---
apiVersion: v1
kind: Service
metadata: 
  name: argo-canary-svc-devops
spec:
  type: ClusterIP
  selector:
    app: canary-devops
  ports:
  - port: 8081
    targetPort: 8081


